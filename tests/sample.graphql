"""
A sample GraphQL schema for testing gqlscope.
"""

type Query {
  """Get all users"""
  users: [User!]!
  """Get a user by ID"""
  user(id: ID!): User
  """Get posts with optional filter"""
  posts(limit: Int, offset: Int): [Post!]
}

type Mutation {
  """Create a new user"""
  createUser(name: String!, email: String!): User
  """Update a user"""
  updateUser(id: ID!, name: String): User
  """Delete a user"""
  deleteUser(id: ID!): Boolean @deprecated(reason: "Use bulkDeleteUsers instead")
}

type Subscription {
  """Subscribe to new user events"""
  onUserCreated: User!
}

"""Represents a user in the system."""
type User {
  id: ID!
  name: String!
  email: String!
  posts: [Post]
  friends: [User]
  role: UserRole
  settings: UserSettings
}

"""Represents a blog post."""
type Post {
  id: ID!
  title: String!
  body: String
  author: User!
  tags: [String!]
  comments: [Comment]
}

type Comment {
  id: ID!
  text: String!
  post: Post!
  author: User!
}

enum UserRole {
  ADMIN
  USER
  MODERATOR
  BANNED
}

input CreateUserInput {
  name: String!
  email: String!
  role: UserRole
}

input UpdateUserInput {
  name: String
  email: String
  role: UserRole
}

scalar DateTime

interface Node {
  id: ID!
}

union SearchResult = User | Post | Comment

"""Marks the field as deprecated."""
directive @deprecated(
  reason: String = "No longer supported"
) on FIELD_DEFINITION | ENUM_VALUE | ARGUMENT_DEFINITION

extend type User {
  """Social media handles [deprecated]"""
  socialHandles: [String!] @deprecated(reason: "Use ProfileSocial model instead")
}